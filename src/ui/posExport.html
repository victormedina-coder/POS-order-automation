<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopify → NetSuite</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f0f; --bg2: #171717; --bg3: #1f1f1f;
    --border: #2a2a2a; --border2: #333;
    --text: #e8e6e0; --text2: #888; --text3: #555;
    --accent: #c8f060; --accent2: #a8d040;
    --danger: #ff5c5c;
    --font-d: system-ui, -apple-system, sans-serif;
    --font-m: 'Courier New', monospace;
    --navbar-h: 52px;
  }

  body {
    background: var(--bg); color: var(--text); font-family: var(--font-d);
    height: 100vh; display: flex; flex-direction: column;
    overflow: hidden; -webkit-font-smoothing: antialiased;
  }

  /* ── Navbar ── */
  .navbar {
    height: var(--navbar-h); min-height: var(--navbar-h); flex-shrink: 0;
    background: var(--bg2); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 1.5rem; gap: 1rem;
  }
  .nav-logo { font-family: var(--font-m); font-size: 11px; color: var(--accent); letter-spacing: .12em; white-space: nowrap; }
  .nav-tabs { display: flex; gap: .25rem; flex: 1; justify-content: center; }
  .nav-tab {
    background: none; border: 1px solid transparent; border-radius: 6px;
    padding: .38rem .9rem; color: var(--text3); font-family: var(--font-d);
    font-size: .85rem; font-weight: 500; cursor: pointer; transition: all .15s;
  }
  .nav-tab:hover { color: var(--text2); background: var(--bg3); }
  .nav-tab.active { background: var(--bg3); color: var(--text); border-color: var(--border2); }
  .nav-user {
    display: flex; align-items: center; gap: .5rem; margin-left: auto;
    font-family: var(--font-m); font-size: .75rem; color: var(--text3); white-space: nowrap;
  }
  .nav-user img { width: 22px; height: 22px; border-radius: 50%; border: 1px solid var(--border2); }
  .nav-user-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  .nav-logout { display: flex; align-items: center; color: var(--text3); opacity: .5; transition: opacity .15s, color .15s; text-decoration: none; margin-left: .25rem; }
  .nav-logout:hover { opacity: 1; color: var(--accent); }

  /* ── Views ── */
  .view { flex: 1; min-height: 0; display: flex; flex-direction: column; }
  .hidden { display: none !important; }

  /* ── Scrollable content ── */
  .content {
    flex: 1; min-height: 0; overflow-y: auto;
    padding: 1.25rem 1.5rem; display: flex; flex-direction: column; gap: 1rem;
  }

  /* ── Shared form label ── */
  .field { display: flex; flex-direction: column; gap: .3rem; }
  .label { font-family: var(--font-m); font-size: 10px; letter-spacing: .12em; color: var(--text3); text-transform: uppercase; }

  /* native select (catalog only) */
  select {
    background: var(--bg3); border: 1px solid var(--border2); border-radius: 7px;
    padding: 0 .7rem; color: var(--text); font-family: var(--font-m);
    font-size: .8rem; outline: none; transition: border-color .15s; height: 34px;
  }
  select:focus { border-color: var(--accent); }
  #import-table { min-width: 160px; }

  /* ── Buttons ── */
  .btn {
    border: none; border-radius: 7px; padding: 0 1rem; height: 34px;
    font-family: var(--font-d); font-size: .85rem; font-weight: 600;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    gap: .5rem; transition: all .15s; white-space: nowrap; flex-shrink: 0;
  }
  .btn:disabled { opacity: .4; cursor: default; }
  .btn-primary { background: var(--accent); color: #0f0f0f; }
  .btn-primary:hover:not(:disabled) { background: var(--accent2); }
  .btn-export { background: var(--bg3); color: var(--accent); border: 1px solid var(--accent); }
  .btn-export:hover:not(:disabled) { background: #1a2a0a; }
  .btn-import { background: var(--bg3); color: var(--text2); border: 1px solid var(--border2); }
  .btn-import:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }

  input[type=file] {
    background: var(--bg3); border: 1px solid var(--border2); border-radius: 7px;
    padding: 0 .6rem; color: var(--text2); font-family: var(--font-m);
    font-size: .75rem; height: 34px; cursor: pointer; width: 210px;
  }
  input[type=file]::file-selector-button {
    background: transparent; border: none; border-right: 1px solid var(--border2);
    color: var(--text3); font-family: var(--font-m); font-size: .75rem;
    padding: 0 .6rem; margin-right: .5rem; cursor: pointer; height: 100%;
  }
  .import-status { font-family: var(--font-m); font-size: .78rem; }
  .import-status.ok  { color: var(--accent); }
  .import-status.err { color: var(--danger); }

  .spinner { width: 14px; height: 14px; border: 2px solid #0f0f0f4a; border-top-color: #0f0f0f; border-radius: 50%; animation: spin .6s linear infinite; }
  .spinner-accent { border-color: #c8f06044; border-top-color: var(--accent); }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ════════════════════════════════════════
     CUSTOM SELECT
     ════════════════════════════════════════ */
  .custom-select { position: relative; min-width: 190px; user-select: none; }
  .cs-trigger {
    width: 100%; height: 34px; padding: 0 .75rem;
    display: flex; align-items: center; justify-content: space-between; gap: .5rem;
    background: var(--bg3); border: 1px solid var(--border2); border-radius: 7px;
    color: var(--text2); font-family: var(--font-m); font-size: .8rem;
    cursor: pointer; transition: border-color .15s, color .15s;
  }
  .cs-trigger:hover { border-color: var(--text3); color: var(--text); }
  .custom-select.open .cs-trigger { border-color: var(--accent); color: var(--text); }
  .cs-arrow { color: var(--text3); flex-shrink: 0; transition: transform .2s ease; }
  .custom-select.open .cs-arrow { transform: rotate(180deg); }

  .cs-dropdown {
    position: absolute; top: calc(100% + 5px); left: 0; right: 0; z-index: 300;
    background: var(--bg2); border: 1px solid var(--border2); border-radius: 9px;
    box-shadow: 0 12px 40px rgba(0,0,0,.7), 0 2px 8px rgba(0,0,0,.4);
    padding: 4px;
    opacity: 0; transform: translateY(-8px) scale(.97);
    pointer-events: none; transform-origin: top center;
    transition: opacity .18s ease, transform .18s ease;
  }
  .custom-select.open .cs-dropdown { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
  .cs-list { max-height: 200px; overflow-y: auto; }
  .cs-option {
    padding: .5rem .8rem; border-radius: 6px;
    font-family: var(--font-m); font-size: .8rem; color: var(--text2);
    cursor: pointer; transition: background .1s, color .1s;
    display: flex; align-items: center; gap: .5rem;
  }
  .cs-option:hover { background: var(--bg3); color: var(--text); }
  .cs-option.selected { color: var(--accent); }
  .cs-check { opacity: 0; font-size: .7rem; flex-shrink: 0; }
  .cs-option.selected .cs-check { opacity: 1; }

  /* ════════════════════════════════════════
     CUSTOM DATE PICKER
     ════════════════════════════════════════ */
  .date-picker { position: relative; user-select: none; }
  .dp-trigger {
    width: 152px; height: 34px; padding: 0 .75rem;
    display: flex; align-items: center; justify-content: space-between; gap: .4rem;
    background: var(--bg3); border: 1px solid var(--border2); border-radius: 7px;
    color: var(--text2); font-family: var(--font-m); font-size: .8rem;
    cursor: pointer; transition: border-color .15s, color .15s;
  }
  .dp-trigger:hover { border-color: var(--text3); color: var(--text); }
  .date-picker.open .dp-trigger { border-color: var(--accent); color: var(--text); }
  .dp-cal-icon { color: var(--text3); flex-shrink: 0; transition: color .15s; }
  .date-picker.open .dp-cal-icon { color: var(--accent); }

  .dp-popup {
    position: absolute; top: calc(100% + 5px); left: 0; z-index: 300;
    width: 276px;
    background: var(--bg2); border: 1px solid var(--border2); border-radius: 10px;
    box-shadow: 0 12px 40px rgba(0,0,0,.7), 0 2px 8px rgba(0,0,0,.4);
    padding: 12px;
    opacity: 0; transform: translateY(-8px) scale(.97);
    pointer-events: none; transform-origin: top left;
    transition: opacity .18s ease, transform .18s ease;
  }
  .date-picker.open .dp-popup { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }

  .dp-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .dp-nav {
    background: none; border: none; color: var(--text3); cursor: pointer;
    width: 26px; height: 26px; border-radius: 5px; display: flex; align-items: center; justify-content: center;
    transition: background .12s, color .12s;
  }
  .dp-nav:hover { background: var(--bg3); color: var(--text); }
  .dp-month-label { font-family: var(--font-m); font-size: .82rem; color: var(--text); letter-spacing: .04em; }

  .dp-weekdays {
    display: grid; grid-template-columns: repeat(7, 1fr);
    border-bottom: 1px solid var(--border); margin-bottom: 6px; padding-bottom: 6px;
  }
  .dp-weekdays span {
    text-align: center; font-family: var(--font-m); font-size: .65rem;
    color: var(--text3); text-transform: uppercase; letter-spacing: .05em; padding: 2px 0;
  }

  .dp-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .dp-cell {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    border-radius: 6px; font-family: var(--font-m); font-size: .78rem;
    color: var(--text3); cursor: pointer; transition: background .1s, color .1s;
  }
  .dp-cell:not(.dp-empty):hover { background: var(--bg3); color: var(--text); }
  .dp-cell.other-month { color: var(--text3); opacity: .4; }
  .dp-cell.today { color: var(--accent); }
  .dp-cell.today::after { content:''; display: block; width: 3px; height: 3px; border-radius: 50%; background: var(--accent); position: absolute; bottom: 3px; }
  .dp-cell.today { position: relative; }
  .dp-cell.selected { background: var(--accent); color: #0f0f0f; font-weight: 700; }
  .dp-cell.selected:hover { background: var(--accent2); }
  .dp-cell.dp-empty { cursor: default; }

  /* ── Filter card ── */
  .filter-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
    padding: 1rem 1.25rem; display: flex; align-items: flex-end;
    gap: 1rem; flex-wrap: wrap; flex-shrink: 0;
  }
  .filter-sep { width: 1px; height: 30px; background: var(--border); flex-shrink: 0; }
  .filter-actions { display: flex; gap: .5rem; }

  /* ── Error banner ── */
  .error-banner {
    padding: .75rem 1rem; border-radius: 8px; background: #2a0f0f;
    border: 1px solid #5c1f1f; color: var(--danger); font-size: .875rem;
    font-family: var(--font-m); display: none; flex-shrink: 0;
  }

  /* ── Empty state ── */
  .empty {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 1rem; color: var(--text3); text-align: center; padding: 2rem;
  }
  .empty p { font-size: .95rem; line-height: 1.7; }
  .empty strong { color: var(--text2); }

  /* ── Stats ── */
  .stats { display: flex; gap: 1rem; flex-wrap: wrap; flex-shrink: 0; }
  .stat {
    flex: 1; min-width: 110px; background: var(--bg2); border: 1px solid var(--border);
    border-radius: 10px; padding: 1rem 1.25rem; display: flex; flex-direction: column; gap: .25rem;
  }
  .stat-val { font-size: 1.5rem; font-weight: 700; color: var(--accent); font-family: var(--font-m); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .stat-lbl { font-family: var(--font-m); font-size: 10px; letter-spacing: .1em; color: var(--text3); text-transform: uppercase; }

  /* ── Results section (tabbed card) ── */
  .results-section {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
    display: flex; flex-direction: column; flex-shrink: 0; min-height: 320px;
  }
  .results-tabs {
    display: flex; border-bottom: 1px solid var(--border);
    background: var(--bg3); border-radius: 10px 10px 0 0;
    padding: 0 .75rem; flex-shrink: 0;
  }
  .results-tab {
    background: none; border: none; border-bottom: 2px solid transparent;
    padding: .6rem .9rem; margin-bottom: -1px;
    font-family: var(--font-d); font-size: .83rem; font-weight: 500;
    color: var(--text3); cursor: pointer; transition: all .15s;
  }
  .results-tab:hover { color: var(--text2); }
  .results-tab.active { color: var(--text); border-bottom-color: var(--accent); }

  .panel-pedidos { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-family: var(--font-m); font-size: .8rem; }
  thead th {
    background: var(--bg3); padding: .55rem 1rem; text-align: left;
    font-size: 10px; letter-spacing: .1em; color: var(--text3); text-transform: uppercase;
    white-space: nowrap; border-bottom: 1px solid var(--border); position: sticky; top: 0;
  }
  tbody td { padding: .5rem 1rem; border-bottom: 1px solid var(--border); white-space: nowrap; color: var(--text2); }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: var(--bg3); color: var(--text); }
  .table-note { padding: .55rem 1rem; font-family: var(--font-m); font-size: .75rem; color: var(--text3); border-top: 1px solid var(--border); background: var(--bg3); }

  .panel-uuid { padding: 1rem 1.25rem; display: flex; flex-direction: column; gap: .55rem; }
  .uuid-row { display: flex; align-items: center; gap: 1rem; }
  .uuid-date { font-family: var(--font-m); font-size: .85rem; color: var(--text2); min-width: 110px; }
  .uuid-input {
    flex: 1; background: var(--bg3); border: 1px solid var(--border2); border-radius: 7px;
    padding: .45rem .75rem; color: var(--text); font-family: var(--font-m);
    font-size: .8rem; outline: none; transition: border-color .15s; height: auto;
  }
  .uuid-input:focus { border-color: var(--accent); }
  .uuid-input::placeholder { color: var(--text3); }

  /* ── Import card ── */
  .import-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
    padding: 1rem 1.25rem; display: flex; align-items: flex-end;
    gap: 1rem; flex-wrap: wrap; flex-shrink: 0;
  }

  /* ── Catalog grid ── */
  .catalog-content {
    flex: 1; min-height: 0; overflow-y: auto;
    padding: 1.25rem 1.5rem; display: flex; flex-direction: column; gap: 1rem;
  }
  .catalog-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; min-height: 0; }
  .catalog-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
    display: flex; flex-direction: column; overflow: hidden; min-height: 0; max-height: calc(100vh - var(--navbar-h) - 6rem);
  }
  .catalog-card-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: .75rem 1rem; border-bottom: 1px solid var(--border);
    background: var(--bg3); flex-shrink: 0;
  }
  .catalog-card-title { font-family: var(--font-m); font-size: 10px; letter-spacing: .12em; color: var(--text3); text-transform: uppercase; }
  .count-badge {
    background: var(--bg); border: 1px solid var(--border2); border-radius: 20px;
    padding: .12rem .5rem; font-family: var(--font-m); font-size: .7rem; color: var(--accent);
  }
  .catalog-table-wrap { flex: 1; overflow-y: auto; }
  .catalog-empty { padding: 2rem; text-align: center; color: var(--text3); font-family: var(--font-m); font-size: .8rem; }
  .catalog-loading { padding: 2rem; display: flex; justify-content: center; }
</style>
</head>
<body>

<!-- ── Navbar ── -->
<nav class="navbar">
  <div class="nav-logo">SHOPIFY → NETSUITE</div>
  <div class="nav-tabs">
    <button class="nav-tab active" data-tab="export" onclick="switchTab('export')">Exportar POS</button>
    <button class="nav-tab" data-tab="catalog" onclick="switchTab('catalog')">Catálogo</button>
  </div>
  <div class="nav-user" id="nav-user"></div>
</nav>

<!-- ── POS Export view ── -->
<div id="view-export" class="view">
  <div class="content">

    <!-- Filter card with custom components -->
    <div class="filter-card">
      <div class="field">
        <label class="label">Sucursal</label>
        <div class="custom-select" id="cs-store">
          <button class="cs-trigger" type="button">
            <span class="cs-value">Cargando...</span>
            <svg class="cs-arrow" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </button>
          <div class="cs-dropdown">
            <div class="cs-list" id="cs-store-list"></div>
          </div>
        </div>
        <input type="hidden" id="store" />
      </div>

      <div class="field">
        <label class="label">Fecha inicio</label>
        <div class="date-picker" id="dp-from">
          <button class="dp-trigger" type="button">
            <span class="dp-value"></span>
            <svg class="dp-cal-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
          </button>
          <div class="dp-popup">
            <div class="dp-header">
              <button class="dp-nav dp-prev" type="button">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
              </button>
              <span class="dp-month-label"></span>
              <button class="dp-nav dp-next" type="button">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
              </button>
            </div>
            <div class="dp-weekdays">
              <span>Lu</span><span>Ma</span><span>Mi</span><span>Ju</span><span>Vi</span><span>Sá</span><span>Do</span>
            </div>
            <div class="dp-grid" id="dp-from-grid"></div>
          </div>
        </div>
        <input type="hidden" id="date-from" />
      </div>

      <div class="field">
        <label class="label">Fecha fin</label>
        <div class="date-picker" id="dp-to">
          <button class="dp-trigger" type="button">
            <span class="dp-value"></span>
            <svg class="dp-cal-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
          </button>
          <div class="dp-popup">
            <div class="dp-header">
              <button class="dp-nav dp-prev" type="button">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
              </button>
              <span class="dp-month-label"></span>
              <button class="dp-nav dp-next" type="button">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
              </button>
            </div>
            <div class="dp-weekdays">
              <span>Lu</span><span>Ma</span><span>Mi</span><span>Ju</span><span>Vi</span><span>Sá</span><span>Do</span>
            </div>
            <div class="dp-grid" id="dp-to-grid"></div>
          </div>
        </div>
        <input type="hidden" id="date-to" />
      </div>

      <div class="filter-sep"></div>
      <div class="filter-actions">
        <button class="btn btn-primary" id="btn-consultar" onclick="consultar()">Consultar pedidos</button>
        <button class="btn btn-export hidden" id="btn-export" onclick="descargar()">↓ Descargar CSV</button>
      </div>
    </div>

    <div class="error-banner" id="error-banner"></div>

    <div class="empty" id="empty-state">
      <p>Selecciona un periodo y haz clic en<br><strong>Consultar pedidos</strong></p>
    </div>

    <div class="stats hidden" id="stats-row"></div>

    <!-- Results: Pedidos / UUID tabs -->
    <div class="results-section hidden" id="results-section">
      <div class="results-tabs">
        <button class="results-tab active" data-panel="pedidos" onclick="switchResults('pedidos')">Pedidos</button>
        <button class="results-tab" data-panel="uuid" onclick="switchResults('uuid')">UUID</button>
      </div>
      <div id="panel-pedidos" class="panel-pedidos">
        <div id="table-wrap"></div>
      </div>
      <div id="panel-uuid" class="panel-uuid hidden">
        <div id="uuid-fields"></div>
      </div>
    </div>

  </div>
</div>

<!-- ── Catalog view ── -->
<div id="view-catalog" class="view hidden">
  <div class="catalog-content">
    <div class="import-card">
      <div class="field">
        <label class="label">Tabla</label>
        <select id="import-table">
          <option value="items">Items</option>
          <option value="locations">Sucursales</option>
          <option value="payment_methods">Métodos de pago</option>
        </select>
      </div>
      <div class="field">
        <label class="label">Archivo CSV</label>
        <input type="file" id="import-file" accept=".csv" />
      </div>
      <button class="btn btn-import" id="btn-import" onclick="importCatalog()">↑ Importar</button>
      <span class="import-status" id="import-status"></span>
    </div>
